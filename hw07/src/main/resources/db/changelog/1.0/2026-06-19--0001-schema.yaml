databaseChangeLog:
  - changeSet:
      id: 2026-06-19--0001-authors
      author: shipko
      changes:
        - createTable:
            tableName: authors
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: varchar(255)

  - changeSet:
      id: 2026-06-19--0002-genres
      author: shipko
      changes:
        - createTable:
            tableName: genres
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)

  - changeSet:
      id: 2026-06-19--0003-books
      author: shipko
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: author_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_books_authors
                    referencedTableName: authors
                    referencedColumnNames: id
                    deleteCascade: true

  - changeSet:
      id: 2026-06-19--0004-books-genres
      author: shipko
      changes:
        - createTable:
            tableName: books_genres
            columns:
              - column:
                  name: book_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_books_genres_books
                    referencedTableName: books
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: genre_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_books_genres_genres
                    referencedTableName: genres
                    referencedColumnNames: id
                    deleteCascade: true
        - addPrimaryKey:
            tableName: books_genres
            columnNames: book_id, genre_id